<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grupo 3</title>

    <link rel="stylesheet" href="../src/css/style-Formulario.css">

    <!-- CDN del JQUERY para que funcione -->
    <script src="https://code.jquery.com/jquery-3.7.1.js"
        integrity="sha256-eKhayi8LEQwp4NKxN+CfCh+3qOVUtJn3QNZ0TciWLP4=" crossorigin="anonymous"></script>


    <!-- CDN del SWEETALERT2 y CSS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.23.0/sweetalert2.min.js"
        integrity="sha512-pnPZhx5S+z5FSVwy62gcyG2Mun8h6R+PG01MidzU+NGF06/ytcm2r6+AaWMBXAnDHsdHWtsxS0dH8FBKA84FlQ=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.23.0/sweetalert2.css"
        integrity="sha512-/j+6zx45kh/MDjnlYQL0wjxn+aPaSkaoTczyOGfw64OB2CHR7Uh5v1AML7VUybUnUTscY5ck/gbGygWYcpCA7w=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>

<body>
    <section class="Titulo">
        <h1> Inscripcion de Eventos</h1>
        <hr>
    </section>

    <section class="Form">
        <div class="Formulario">
            <div>
                <form id="Inscripcion" class="Formulario-Grid">
                    <label for=""> Nombre: </label>
                    <input type="text" id="Nombre" placeholder="Ingrese su nombre">

                    <label for=""> Numero de telefono: </label>
                    <input type="tel" id="Telefono" placeholder="Ingrese su Numero de Telefono">


                    <label for=""> Correo electronico: </label>
                    <input type="email" id="Email" placeholder="Ingrese su correo electronico">


                    <label for=""> Tipo de evento: </label>
                    <div class="Sel">
                        <select id="Carrera">
                            <option value=""> Seleccione Tipo de Evento</option>
                            <option value="DW-FrontEnd"> Desarrollo Web FrontEnd </option>
                            <option value="Python"> Introduccion a Python para principantes </option>
                            <option value="CiberSeguridad"> Fundamentos de CiberSeguridad</option>
                            <option value="Recursos-Humanos"> Gestion de Recursos Humanos</option>
                            <option value="Finanzas">Finanzas Empresariales </option>
                            <option value="Marketing">Marketing Estrategico </option>
                            <option value="Psicologia">Psicologia del Comportamiento Humano </option>
                            <option value="Nutricion ">Nutricion y Alimentos Saludables</option>
                            <option value="Primeros-Auxilios">Primeros Auxilios y Atencion de Emergencias </option>
                        </select>
                    </div>

                    <label for=""> No.Identificacion: </label>
                    <input type="text" id="ID" placeholder="Ingrese su No.Identificacio">

                    <label for=""> Fecha de Inicio </label>
                    <input type="date" id="Fecha-Inicio" placeholder="Ingrese la fecha de inicio">

                    <label for=""> Fecha de Finalizacion </label>
                    <input type="date" id="Fecha-Finalizacion" placeholder="Ingrese la fecha de finalizacion">


                    <label for=""> Informacion Requerida:</label>
                    <textarea name="" id="Info"
                        placeholder="Ej. Que incluye el curso, Becas disponibles, etc. (No es obligatorio)"></textarea>


                    <button type="submit" class="Enviar" onclick="GuardarDatos()"> Guardar Inscripcion </button>
                    
                </form>
                <br>
                <div>
                <button class="Ver"> Ver Tabla de Inscripciones </button>
                </div>
            </div>
        </div>
    </section>




    <script src="../src/js/formulario.js"></script>
</body>
